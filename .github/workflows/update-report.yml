name: Update Dashboard Data

on:
  schedule:
    - cron: '0 * * * *' # প্রতি ঘণ্টায় অটোমেটিক রান হবে
  workflow_dispatch: # ম্যানুয়ালি রান করার বাটন রাখবে

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install googleads

    - name: Run report script
      env:
        GAM_KEY_JSON: ${{ secrets.GAM_KEY_JSON }}
        GAM_NETWORK_CODE: ${{ secrets.GAM_NETWORK_CODE }}
      run: python generate_report.py

    - name: Commit and Push isolated data
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        # নতুন data ফোল্ডার এবং ভেতরের সব ফাইল গিটহাবে অ্যাড করা
        git add data/
        git diff-index --quiet HEAD || git commit -m "Update isolated publisher reports"
        git push
