    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #0a0a0f; overflow-x: hidden; }
        .bg-gradient-radial { background: radial-gradient(ellipse at top, rgba(99, 102, 241, 0.15) 0%, transparent 50%), radial-gradient(ellipse at bottom right, rgba(168, 85, 247, 0.1) 0%, transparent 50%), #0a0a0f; }
        .glow-border { box-shadow: 0 0 0 1px rgba(255,255,255,0.05), 0 0 40px rgba(99, 102, 241, 0.1), 0 20px 60px rgba(0,0,0,0.5); }
        .glow-text { background: linear-gradient(135deg, #818cf8 0%, #c084fc 50%, #f0abfc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .input-glow:focus { box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.3), 0 0 20px rgba(99, 102, 241, 0.15); }
        .btn-primary { background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); transition: all 0.3s ease; }
        .btn-primary:hover { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); box-shadow: 0 8px 30px rgba(99, 102, 241, 0.3); transform: translateY(-1px); }
        .btn-admin { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); transition: all 0.3s ease; }
        .btn-admin:hover { background: linear-gradient(135deg, #334155 0%, #475569 100%); box-shadow: 0 8px 30px rgba(51, 65, 85, 0.3); transform: translateY(-1px); }
        .tab-active { background: rgba(99, 102, 241, 0.1); color: #818cf8; }
        .grid-bg { background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px); background-size: 40px 40px; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .float-anim { animation: float 6s ease-in-out infinite; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.5s ease-out; }
    </style>
