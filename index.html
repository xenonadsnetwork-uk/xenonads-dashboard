<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XenonAds | Publisher Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Inter:wght@100..900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0d0c0a;
            --card-bg: #14120f;
            --accent-brown: #a37f51;
            --accent-brown-dim: #261f17;
            --text-main: #f5f4f0;
            --text-muted: #9e9b94;
            --border-color: #24201a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            padding: 2rem 1rem;
            min-height: 100vh;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* Header Style */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            font-family: 'Fraunces', serif;
            font-size: 2rem;
            font-weight: 700;
            color: #ffffff;
            background: linear-gradient(135deg, #ffffff, var(--accent-brown));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-text {
            font-family: 'Inter', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .welcome-msg {
            text-align: right;
        }

        .welcome-msg p {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .welcome-msg h3 {
            font-size: 1rem;
            font-weight: 500;
            margin-top: 0.25rem;
        }

        /* Controls Area */
        .controls-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .selector-box label {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-right: 0.5rem;
        }

        .selector-box select {
            background-color: var(--card-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 0.5rem 2rem 0.5rem 1rem;
            border-radius: 4px;
            outline: none;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' fill='none'><path stroke='%23a37f51' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round' d='M1 1l4 4 4-4'/></svg>");
            background-repeat: no-repeat;
            background-position: right 0.75rem center;
        }

        .selector-box select:focus {
            border-color: var(--accent-brown);
        }

        .timestamp {
            color: var(--text-muted);
            font-size: 0.85rem;
            background-color: var(--accent-brown-dim);
            padding: 0.4rem 0.75rem;
            border-radius: 4px;
            border: 1px solid rgba(163, 127, 81, 0.2);
        }

        /* Metrics Grid */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 1.75rem;
            border-radius: 6px;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .card:hover {
            border-color: rgba(163, 127, 81, 0.4);
        }

        .card-title {
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.75rem;
        }

        .card-value {
            font-family: 'Fraunces', serif;
            font-size: 2.25rem;
            font-weight: 500;
        }

        .card-value.revenue-val {
            color: #ffffff;
            border-left: 3px solid var(--accent-brown);
            padding-left: 0.5rem;
        }

        /* Message screens */
        .msg-screen {
            text-align: center;
            padding: 5rem 2rem;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
        }

        .msg-screen h2 {
            font-family: 'Fraunces', serif;
            margin-bottom: 1rem;
            color: var(--accent-brown);
        }

        .msg-screen p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="error-screen" class="msg-screen hidden">
            <h2 id="error-title">Access Denied</h2>
            <p id="error-desc">Please provide a valid publisher security key to access the dashboard.</p>
        </div>

        <div id="dashboard-content" class="hidden">
            <header>
                <div class="logo-area">
                    <span class="logo-icon">X</span>
                    <span class="logo-text">XenonAds</span>
                </div>
                <div class="welcome-msg">
                    <p>Welcome back,</p>
                    <h3 id="pub-name-display">Loading Publisher...</h3>
                </div>
            </header>

            <div class="controls-area">
                <div class="selector-box">
                    <label for="site-selector">View Statistics for:</label>
                    <select id="site-selector">
                        </select>
                </div>
                <div class="timestamp" id="update-time">
                    As of: Loading...
                </div>
            </div>

            <div class="metrics-grid">
                <div class="card">
                    <div class="card-title">Estimated Earnings</div>
                    <div class="card-value revenue-val" id="val-revenue">$0.00</div>
                </div>
                <div class="card">
                    <div class="card-title">Ad Impressions</div>
                    <div class="card-value" id="val-impressions">0</div>
                </div>
                <div class="card">
                    <div class="card-title">Clicks</div>
                    <div class="card-value" id="val-clicks">0</div>
                </div>
                <div class="card">
                    <div class="card-title">Page CTR</div>
                    <div class="card-value" id="val-ctr">0.00%</div>
                </div>
                <div class="card">
                    <div class="card-title">Page eCPM</div>
                    <div class="card-value" id="val-ecpm">$0.00</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // URL থেকে ?pub=... ভ্যালু নেওয়া
        const urlParams = new URLSearchParams(window.location.search);
        const pubCode = urlParams.get('pub');

        const errorScreen = document.getElementById('error-screen');
        const dashboardContent = document.getElementById('dashboard-content');

        if (!pubCode || pubCode.trim() === "") {
            showError("Access Denied", "No valid access token provided. Please check your dashboard link.");
        } else {
            // শুধুমাত্র নির্দিষ্ট পাবলিশারের ফাইল রিকোয়েস্ট করা
            fetch(`./data/${pubCode}.json`)
                .then(response => {
                    if (!response.ok) {
                        throw new Error("Invalid token");
                    }
                    return response.json();
                })
                .then(data => {
                    initDashboard(data);
                })
                .catch(err => {
                    showError("Invalid Access Key", "The token provided in the link is incorrect or has expired.");
                });
        }

        function showError(title, message) {
            document.getElementById('error-title').innerText = title;
            document.getElementById('error-desc').innerText = message;
            errorScreen.classList.remove('hidden');
            dashboardContent.classList.add('hidden');
        }

        function initDashboard(data) {
            document.getElementById('pub-name-display').innerText = data.publisher_name;
            
            // টাইমস্ট্যাম্প ফরম্যাট করা
            if(data.generated_at) {
                const date = new Date(data.generated_at);
                document.getElementById('update-time').innerText = `Hourly Update: ${date.toLocaleString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true })} (${date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })})`;
            }

            const selector = document.getElementById('site-selector');
            
            // ড্রপডাউন রেডি করা
            selector.innerHTML = '';
            
            // ১টির বেশি সাইট থাকলে 'All Sites' অপশন দেখানো
            if (data.sites.length > 1) {
                const allOpt = document.createElement('option');
                allOpt.value = 'all';
                allOpt.innerText = 'All Approved Sites (Combined)';
                selector.appendChild(allOpt);
            }

            data.sites.forEach((site, index) => {
                const opt = document.createElement('option');
                opt.value = index;
                opt.innerText = site.site_name;
                selector.appendChild(opt);
            });

            // ড্রপডাউন চেঞ্জ ইভেন্ট
            selector.addEventListener('change', () => {
                renderMetrics(data, selector.value);
            });

            // শুরুতে প্রথম অপশন লোড করা
            renderMetrics(data, selector.value);
            
            // ড্যাশবোর্ড স্ক্রিন শো করা
            errorScreen.classList.add('hidden');
            dashboardContent.classList.remove('hidden');
        }

        function renderMetrics(data, selection) {
            let impressions = 0;
            let clicks = 0;
            let revenue = 0;
            let ctr = 0;
            let ecpm = 0;

            if (selection === 'all') {
                // সব সাইটের ডেটা যোগ করা (Combined)
                data.sites.forEach(site => {
                    impressions += site.impressions;
                    clicks += site.clicks;
                    revenue += site.revenue;
                });
                ctr = impressions > 0 ? (clicks / impressions * 100) : 0;
                ecpm = impressions > 0 ? (revenue / impressions * 1000) : 0;
            } else {
                // নির্দিষ্ট ১টি সাইটের ডেটা নেওয়া
                const site = data.sites[parseInt(selection)];
                impressions = site.impressions;
                clicks = site.clicks;
                revenue = site.revenue;
                ctr = site.ctr;
                ecpm = site.ecpm;
            }

            // স্ক্রিনে ডেটা বসানো
            document.getElementById('val-revenue').innerText = `$${revenue.toFixed(2)}`;
            document.getElementById('val-impressions').innerText = impressions.toLocaleString('en-US');
            document.getElementById('val-clicks').innerText = clicks.toLocaleString('en-US');
            document.getElementById('val-ctr').innerText = `${ctr.toFixed(2)}%`;
            document.getElementById('val-ecpm').innerText = `$${ecpm.toFixed(2)}`;
        }
    </script>
</body>
</html>
